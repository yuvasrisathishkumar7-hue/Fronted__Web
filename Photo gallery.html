<!DOCTYPE html>
<html>
<head>
    <title>Responsive Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color:lightpink;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(16, 15, 15, 0.2);
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h2>SHIN CHAN MEMORIES</h2>
    <div class="gallery">
        <img src="image1.jpg"  width="200" height="200">
        <img src="image2.jpg"  width="200" height="200">
        <img src="image3.jpg" width="200" height="200">
        <img src="image4.jpg" width="200" height="200">
        <img src="image5.jpg" width="200" height="200">
        <img src="image6.jpg" width="200" height="200">
        <img src="image7.jpg" width="200" height="200">
        <img src="image8.jpg" width="200" height="200">
        <img src="image9.jpg" width="200" height="200">   
    </div>
</body>
</html>
